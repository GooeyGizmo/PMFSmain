  <body>
    <!-- PWA Splash Screen with orientation-responsive images -->
    <style>
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #1a1306;
      }
      #splash-screen img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      #splash-screen .splash-portrait { display: none; }
      #splash-screen .splash-landscape { display: block; }
      @media (orientation: portrait) {
        #splash-screen .splash-portrait { display: block; }
        #splash-screen .splash-landscape { display: none; }
      }
    </style>
    <div id="splash-screen">
      <img class="splash-portrait" src="/splash-portrait.png" alt="Loading" />
      <img class="splash-landscape" src="/splash-landscape.png" alt="Loading" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            var regs = await navigator.serviceWorker.getRegistrations();
            for (var r of regs) { await r.unregister(); }
            var keys = await caches.keys();
            for (var k of keys) { await caches.delete(k); }
            console.log('SW cleanup done, cleared ' + keys.length + ' caches');
          } catch(e) { console.log('SW cleanup error:', e); }
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('SW registered:', registration.scope);
            })
            .catch(function(error) {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
