    <style>
      #splash-screen {

        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #1a1306;
      }
      #splash-screen img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      #splash-screen .splash-portrait { display: none; }
      #splash-screen .splash-landscape { display: block; }
      @media (orientation: portrait) {
        #splash-screen .splash-portrait { display: block; }
        #splash-screen .splash-landscape { display: none; }
      }
    </style>
